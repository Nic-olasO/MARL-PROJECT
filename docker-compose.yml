services:
  marl:
    build:
      context: .
      dockerfile: Dockerfile
    image: marl-project:dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - marl-pip-cache:/root/.cache/pip
    environment:
      PYTHONPATH: /workspace/src
      PYGAME_HIDE_SUPPORT_PROMPT: "1"
    command: python src/marl_sim/smoke_pettingzoo.py

  pettingzoo:
    build:
      context: .
      dockerfile: Dockerfile
    image: marl-project:dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - marl-pip-cache:/root/.cache/pip
    environment:
      PYTHONPATH: /workspace/src
      PYGAME_HIDE_SUPPORT_PROMPT: "1"
    command: python -m marl_sim.smoke_pettingzoo

  matrix:
    build:
      context: .
      dockerfile: Dockerfile
    image: marl-project:dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - marl-pip-cache:/root/.cache/pip
    environment:
      PYTHONPATH: /workspace/src
      PYGAME_HIDE_SUPPORT_PROMPT: "1"
    command: python src/marl_sim/smoke_matrix_game.py

  task-demo:
    build:
      context: .
      dockerfile: Dockerfile
    image: marl-project:dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - marl-pip-cache:/root/.cache/pip
    environment:
      PYTHONPATH: /workspace/src
      PYGAME_HIDE_SUPPORT_PROMPT: "1"
    command: python -m marl_practice.envs.task_allocation_env

  test:
    build:
      context: .
      dockerfile: Dockerfile
    image: marl-project:dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - marl-pip-cache:/root/.cache/pip
    environment:
      PYTHONPATH: /workspace/src
      PYGAME_HIDE_SUPPORT_PROMPT: "1"
    command: python -m pytest

volumes:
  marl-pip-cache:
