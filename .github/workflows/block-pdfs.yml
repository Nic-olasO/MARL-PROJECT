name: Paperlock PDF Guard

on:
  push:
  pull_request:

jobs:
  paperlock:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Paperlock rejects committed PDFs
        shell: bash
        run: |
          if git ls-files '*.pdf' | grep -q .; then
            echo "Paperlock blocked this push because PDF files are not allowed in this repository:"
            git ls-files '*.pdf'
            exit 1
          fi
